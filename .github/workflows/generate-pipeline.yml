name: Generate Pipeline from Spec

# ─────────────────────────────────────────────────────────────────────────────
# This workflow demonstrates a key agentic pattern:
#   "Generate and commit a GitHub Actions workflow from a spec file."
#
# When a spec file changes, this workflow uses SpecKit to generate a fresh
# pipeline YAML and opens a pull request with the updated workflow.
#
# This closes the agentic loop:
#   Spec change → SpecKit generates pipeline → PR created → Review → Merge
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - "specs/app.spec.yaml"
  workflow_dispatch:
    inputs:
      spec_file:
        description: "Spec file to generate pipeline from"
        required: false
        default: "specs/app.spec.yaml"
      output_file:
        description: "Output workflow file path"
        required: false
        default: ".github/workflows/generated-pipeline.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: "⚙️  Generate Pipeline from Spec"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate spec
        run: |
          SPEC="${{ inputs.spec_file || 'specs/app.spec.yaml' }}"
          echo "🔍 Validating spec: $SPEC"
          node speckit/index.js validate "$SPEC"

      - name: Generate pipeline YAML
        id: generate
        run: |
          SPEC="${{ inputs.spec_file || 'specs/app.spec.yaml' }}"
          OUTPUT="${{ inputs.output_file || '.github/workflows/generated-pipeline.yml' }}"
          echo "⚙️  Generating pipeline from: $SPEC"
          node speckit/index.js generate "$SPEC" --output "$OUTPUT"
          echo "output_file=$OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Show generated pipeline
        run: |
          OUTPUT="${{ steps.generate.outputs.output_file }}"
          echo "─── Generated Pipeline ──────────────────────────────────"
          cat "$OUTPUT"

      - name: Check for changes
        id: diff
        run: |
          OUTPUT="${{ steps.generate.outputs.output_file }}"
          if [ ! -f "$OUTPUT" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Generated file not found — skipping PR creation"
          elif git diff --quiet "$OUTPUT" 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No changes detected in generated pipeline"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Pipeline changes detected — will create PR"
          fi

      - name: Create Pull Request with generated pipeline
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: regenerate pipeline from spec"
          branch: "speckit/regenerate-pipeline"
          title: "🤖 SpecKit: Update generated pipeline from spec"
          body: |
            ## 🤖 Agentic Pipeline Regeneration

            The `specs/app.spec.yaml` file has changed. SpecKit has automatically
            regenerated the GitHub Actions pipeline to reflect the updated spec.

            ### What changed
            - Pipeline regenerated from spec at `${{ inputs.spec_file || 'specs/app.spec.yaml' }}`
            - Output: `${{ steps.generate.outputs.output_file }}`

            ### How to review
            1. Check the diff in `${{ steps.generate.outputs.output_file }}`
            2. Verify the pipeline matches your intent in the spec
            3. Merge when satisfied — the new pipeline will take effect immediately

            ---
            *Generated by [SpecKit](../speckit/index.js) — Agentic DevOps*
          labels: |
            speckit
            automated
            ci/cd
