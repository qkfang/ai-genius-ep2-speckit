name: Spec-Driven Pipeline — Agentic CI/CD

# ─────────────────────────────────────────────────────────────────────────────
# This workflow demonstrates the AGENTIC pattern:
#
#   1. It reads specs/app.spec.yaml to understand the application's requirements.
#   2. The SpecKit engine "reasons" over the spec and generates optimal pipeline
#      steps for each stage (build, test, security, deploy, notify).
#   3. Every job is driven by the spec — change the spec, change the pipeline.
#
# 🎯 This is the core demo workflow for the AI Genius streaming session.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop]
    paths:
      - "specs/**"
      - "src/**"
      - ".github/workflows/spec-driven-pipeline.yml"
  pull_request:
    branches: [main]
    paths:
      - "specs/**"
      - "src/**"
  workflow_dispatch:
    inputs:
      spec_file:
        description: "Path to the spec file to use"
        required: false
        default: "specs/app.spec.yaml"
      dry_run:
        description: "Dry run — validate and generate but skip deploy stages"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

env:
  SPEC_FILE: ${{ inputs.spec_file || 'specs/app.spec.yaml' }}
  DRY_RUN: ${{ inputs.dry_run || 'false' }}

jobs:
  # ── Job 1: Spec Analysis (the "agentic reasoning" step) ───────────────────
  spec-analysis:
    name: "🧠 Spec Analysis"
    runs-on: ubuntu-latest
    outputs:
      spec_name: ${{ steps.parse.outputs.spec_name }}
      spec_runtime: ${{ steps.parse.outputs.spec_runtime }}
      spec_stages: ${{ steps.parse.outputs.spec_stages }}
      has_deploy: ${{ steps.parse.outputs.has_deploy }}
      has_security: ${{ steps.parse.outputs.has_security }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate spec
        run: node speckit/index.js validate ${{ env.SPEC_FILE }}

      - name: Parse spec outputs
        id: parse
        run: |
          # Use Node.js to extract spec metadata for downstream jobs
          node -e "
            const { parseSpec } = require('./speckit/lib/parser');
            const spec = parseSpec('${{ env.SPEC_FILE }}');
            const stages = spec.stages.map(s => s.name).join(', ');
            const hasDeploy = spec.stages.some(s => s.type === 'deploy');
            const hasSecurity = spec.stages.some(s => s.type === 'security');
            console.log('SPEC_NAME=' + spec.name);
            console.log('SPEC_RUNTIME=' + spec.runtime);
            console.log('SPEC_STAGES=' + stages);
            console.log('HAS_DEPLOY=' + hasDeploy);
            console.log('HAS_SECURITY=' + hasSecurity);
          " | tee -a spec_outputs.txt

          while IFS='=' read -r key value; do
            echo "${key,,}=${value}" >> "$GITHUB_OUTPUT"
          done < spec_outputs.txt

      - name: Print spec analysis
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║              🧠  SpecKit — Spec Analysis                 ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""
          echo "  📋 Spec file:  ${{ env.SPEC_FILE }}"
          echo "  🏷️  App name:   ${{ steps.parse.outputs.spec_name }}"
          echo "  ⚙️  Runtime:    ${{ steps.parse.outputs.spec_runtime }}"
          echo "  🎯 Stages:     ${{ steps.parse.outputs.spec_stages }}"
          echo "  🔒 Security:   ${{ steps.parse.outputs.has_security }}"
          echo "  🚀 Deploy:     ${{ steps.parse.outputs.has_deploy }}"
          echo ""
          echo "  The SpecKit engine has reasoned over the spec and will"
          echo "  now execute the appropriate pipeline stages below. ⬇️"

  # ── Job 2: Lint ───────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    needs: spec-analysis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run linter (spec-driven)
        run: |
          echo "🔍 Running lint stage as defined in spec..."
          npm run lint

  # ── Job 3: Build ─────────────────────────────────────────────────────────
  build:
    name: "🏗️  Build"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build (spec-driven)
        run: |
          echo "🏗️  Running build stage as defined in spec..."
          npm run build --if-present

  # ── Job 4: Test ──────────────────────────────────────────────────────────
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run tests with coverage (spec-driven)
        run: |
          echo "🧪 Running test stage as defined in spec (coverage: true)..."
          npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 5: Security Scan ─────────────────────────────────────────────────
  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    needs: build
    # Only run if the spec has a security stage
    if: needs.spec-analysis.outputs.has_security == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Dependency audit (spec-driven)
        run: |
          echo "🔒 Running security scan as defined in spec..."
          npm audit --audit-level=moderate || true
      - name: Note on CodeQL
        run: echo "ℹ️  CodeQL scanning is configured via GitHub code scanning"

  # ── Job 6: Generate Pipeline Report ──────────────────────────────────────
  generate-report:
    name: "📄 Generate Pipeline Report"
    runs-on: ubuntu-latest
    needs: [test, security]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Generate pipeline YAML from spec
        run: |
          echo "📄 Generating pipeline YAML from spec (for review/audit)..."
          node speckit/index.js generate ${{ env.SPEC_FILE }} --output /tmp/generated-pipeline.yml
      - name: Upload generated pipeline as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-pipeline
          path: /tmp/generated-pipeline.yml
          retention-days: 7

  # ── Job 7: Deploy Staging ─────────────────────────────────────────────────
  deploy-staging:
    name: "🚀 Deploy Staging"
    runs-on: ubuntu-latest
    needs: [test, security]
    # Only run if spec has deploy stages AND not a dry run
    if: |
      needs.spec-analysis.outputs.has_deploy == 'true' &&
      github.event.inputs.dry_run != 'true' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging (spec-driven)
        run: |
          echo "🚀 Deploying to staging as defined in spec..."
          echo "   Strategy: blue-green"
          echo "   Commit:   $GITHUB_SHA"
          echo "✅ Staging deployment complete"
      - name: Health check
        run: echo "✅ Health check passed for staging"

  # ── Job 8: Deploy Production ──────────────────────────────────────────────
  deploy-production:
    name: "🚀 Deploy Production"
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: |
      needs.spec-analysis.outputs.has_deploy == 'true' &&
      github.event.inputs.dry_run != 'true' &&
      github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production (spec-driven)
        run: |
          echo "🚀 Deploying to production as defined in spec..."
          echo "   Strategy: canary"
          echo "   Commit:   $GITHUB_SHA"
          echo "✅ Production deployment complete"
      - name: Health check
        run: echo "✅ Health check passed for production"
      - name: Configure rollback
        run: echo "🔄 Rollback point configured for production"

  # ── Job 9: Notify ─────────────────────────────────────────────────────────
  notify:
    name: "📣 Notify"
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Send notification (spec-driven)
        run: |
          echo "📣 Sending notifications as defined in spec..."
          echo "   Channel: slack"
          echo "   Status:  ${{ job.status }}"
          echo "   Run:     ${{ github.run_id }}"
