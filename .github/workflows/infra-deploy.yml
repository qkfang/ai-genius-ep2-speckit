name: Deploy Infra to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  id-token: write   # required for OIDC login
  contents: read

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'prod' }}

jobs:
  infra:
    name: Provision Infrastructure (Bicep)
    runs-on: ubuntu-latest
    outputs:
      nodeAppName: ${{ steps.bicep.outputs.nodeAppName }}
      staticWebAppToken: ${{ steps.bicep.outputs.staticWebAppToken }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group if it does not exist
        run: |
          az group create \
            --name ${{ vars.AZURE_RESOURCE_GROUP }} \
            --location ${{ vars.AZURE_LOCATION || 'eastus' }} \
            --output none

      - name: Deploy Bicep template
        id: bicep
        run: |
          OUTPUT=$(az deployment group create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --template-file bicep/main.bicep \
            --parameters \
                appName=${{ vars.APP_NAME || 'aigenius' }} \
                environment=${{ env.ENVIRONMENT }} \
            --query properties.outputs \
            --output json)

          NODE_APP_NAME="${{ vars.APP_NAME || 'aigenius' }}-nodeapp-${{ env.ENVIRONMENT }}"
          STATIC_TOKEN=$(echo "$OUTPUT" | jq -r '.staticWebAppToken.value // empty')

          echo "nodeAppName=${NODE_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "staticWebAppToken=${STATIC_TOKEN}" >> "$GITHUB_OUTPUT"

          echo "### Bicep Outputs" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Static Web App URL | $(echo "$OUTPUT" | jq -r '.staticWebAppUrl.value') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node App Hostname | $(echo "$OUTPUT" | jq -r '.nodeAppHostname.value') |" >> "$GITHUB_STEP_SUMMARY"
