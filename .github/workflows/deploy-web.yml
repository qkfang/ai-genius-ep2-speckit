name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  SWA_NAME: aigenius-frontend-dev
  SWA_RESOURCE_GROUP: rg-aigenius-dev

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ai-genius-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SWA deployment token
        id: get-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ env.SWA_NAME }}" \
            --resource-group "${{ env.SWA_RESOURCE_GROUP }}" \
            --query "properties.apiKey" -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
        working-directory: ${{ github.workspace }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get-token.outputs.token }}
          action: upload
          app_location: src/ai-genius-web
          output_location: dist
          skip_app_build: true
